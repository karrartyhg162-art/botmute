# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# بيانات تسجيل الدخول - Telegram Auto-Mute Bot
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# انسخ هذا الملف الى credentials.conf واملأ البيانات:
#   cp credentials.example.conf credentials.conf
#   nano credentials.conf
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# رقم API_ID من https://my.telegram.org
API_ID=

# نص API_HASH من https://my.telegram.org
API_HASH=

# رقم الهاتف مع كود الدولة (مثال: +966512345678)
PHONE_NUMBER=

# توكن البوت من @BotFather
BOT_TOKEN=

# آيدي المالك (Telegram ID) - تحصل عليه من @userinfobot
OWNER_ID=

# قائمة المستثنين من الكتم (IDs مفصولة بفاصلة)
# مثال: WHITELIST=123456789,987654321
WHITELIST=
